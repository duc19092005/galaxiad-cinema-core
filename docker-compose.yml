services:
  # ─────────────────────────────────────────
  # C# ASP.NET Core API
  # ─────────────────────────────────────────
  api:
    image: cinema-api
    build:
      context: ./apps/backend
      dockerfile: Cinema.Api/Dockerfile
      target: development
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./apps/backend:/src
      - /src/Cinema.Api/bin
      - /src/Cinema.Api/obj
      - /src/Cinema.Application/bin
      - /src/Cinema.Application/obj
      - /src/Cinema.Domain/bin
      - /src/Cinema.Domain/obj
      - /src/Cinema.Infrastructure/bin
      - /src/Cinema.Infrastructure/obj
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ASPNETCORE_ENVIRONMENT=Docker
    networks:
      - cinema-network
    depends_on:
      - mssql
      - redis
      - ai

  # ─────────────────────────────────────────
  # React Frontend (Vite)
  # ─────────────────────────────────────────
  frontend:
    image: cinema-frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    networks:
      - cinema-network
    depends_on:
      - api

  # ─────────────────────────────────────────
  # Python AI Microservice (Recommendation)
  # ─────────────────────────────────────────
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    image: cinema-ai
    container_name: cinema-ai-service
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    env_file:
      - path: ./services/ai/.env
        required: false
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIM=1024
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=cinema_movies
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # SQL Server 2022
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: cinema-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - cinema-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=anhduc9A@5
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - cinema-network

networks:
  cinema-network:
    driver: bridge

volumes:
  sqlvolume:
  qdrant_storage:
  hf_cache:
