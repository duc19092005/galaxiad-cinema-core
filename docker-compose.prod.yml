services:
  # ─────────────────────────────────────────
  # C# ASP.NET Core API (Production)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./apps/backend
      dockerfile: Cinema.Api/Dockerfile
      target: final
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - cinema-network
    depends_on:
      mssql:
        condition: service_healthy
      ai:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Python AI Microservice (Production)
  # Cloud embedding (Jina AI) + Cloud Qdrant
  # ─────────────────────────────────────────
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./services/ai/.env
        required: false
    environment:
      - ENVIRONMENT=production
      - EMBEDDING_BACKEND=cloud
      - HOST=0.0.0.0
      - PORT=8000
      - EMBEDDING_DIM=1024
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # SQL Server 2022
  # ─────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - cinema-network

networks:
  cinema-network:
    driver: bridge

volumes:
  sqlvolume:
