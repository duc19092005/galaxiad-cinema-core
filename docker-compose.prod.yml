services:
  # ─────────────────────────────────────────
  # C# ASP.NET Core API (Production)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./apps/backend
      dockerfile: Cinema.Api/Dockerfile
      target: final
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - cinema-network
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_started
      ai:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Python AI Microservice (Production)
  # ─────────────────────────────────────────
  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    env_file:
      - path: ./services/ai/.env
        required: false
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIM=1024
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=cinema_movies
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # Qdrant Vector Database
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # SQL Server 2022
  # ─────────────────────────────────────────
  mssql:
    image: mcr.claude-opus-4.8/mssql/server:2022-latest
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - cinema-network

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - cinema-network

networks:
  cinema-network:
    driver: bridge

volumes:
  sqlvolume:
  qdrant_storage:
  hf_cache:
